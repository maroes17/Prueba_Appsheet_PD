<!DOCTYPE html>
<html>
<head>
    <title>Resumen de Caja</title>
</head>
<body>
    <h1>Resumen de Apertura y Cierre</h1>
    <p id="nombre"><strong>Nombre:</strong> </p>
    <p id="desde"><strong>Fecha de Apertura:</strong> </p>
    <p id="faltante"><strong>Valor Faltante:</strong> </p>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Obtener los parámetros de la URL
            const valores = window.location.search;
            const urlParams = new URLSearchParams(valores);

            // 2. Extraer cada dato por su nombre (el que definiste en AppSheet)
            const nombre = urlParams.get('nombre');
            const desde = urlParams.get('desde');
            const faltante = urlParams.get('faltante');

            // 3. Insertar los datos en el DOM (en las etiquetas <p>)
            if(nombre) {
                document.getElementById('nombre').innerHTML += nombre;
            }
            if(desde) {
                document.getElementById('desde').innerHTML += desde;
            }
            if(faltante) {
                document.getElementById('faltante').innerHTML += faltante;
            }
        });
    </script>
</body>
</html>
